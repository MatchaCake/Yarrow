<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yarrow Demo</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f5ef;
      --panel: #fffdf7;
      --ink: #171713;
      --muted: #6f6b60;
      --line: #d9d1c1;
      --green: #0c7a43;
      --red: #a1372d;
      --gold: #b98317;
      --black: #10100d;
      --shadow: 0 16px 36px rgba(31, 29, 20, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      background: var(--paper);
      color: var(--ink);
    }
    button, input {
      font: inherit;
    }
    button {
      border: 1px solid var(--black);
      background: var(--black);
      color: #fffdf7;
      padding: 0.48rem 0.7rem;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #343329; }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    input[type="text"] {
      min-width: 10rem;
      border: 1px solid var(--line);
      background: white;
      padding: 0.48rem 0.58rem;
    }
    input[type="range"] {
      accent-color: var(--green);
    }
    .shell {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }
    header {
      border-bottom: 2px solid var(--black);
      padding-bottom: 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 4.7rem);
      line-height: 0.92;
      letter-spacing: 0;
      max-width: 820px;
    }
    .subhead {
      margin: 12px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      line-height: 1.45;
    }
    .status {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status.error {
      color: var(--red);
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 24px;
      padding-top: 24px;
    }
    section {
      min-width: 0;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
      padding-bottom: 8px;
      gap: 12px;
    }
    h2 {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .small {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.84rem;
    }
    .market-list {
      display: grid;
      gap: 10px;
    }
    .market-row {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .market-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .market-title {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.25;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--black);
      padding: 0.14rem 0.38rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(94px, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-top: 12px;
    }
    .metric-label {
      display: block;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .metric-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .edge-hot { color: var(--green); }
    .edge-cold { color: var(--red); }
    .edge-neutral { color: var(--muted); }
    .stance-toggle {
      margin-top: 12px;
      background: transparent;
      color: var(--black);
    }
    .stance-form {
      display: none;
      grid-template-columns: minmax(120px, 1fr) minmax(150px, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .stance-form.open {
      display: grid;
    }
    .slider-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      min-width: 3.5rem;
      display: inline-block;
      text-align: right;
    }
    .leaderboard {
      background: var(--black);
      color: var(--panel);
      padding: 16px;
      position: sticky;
      top: 12px;
      box-shadow: var(--shadow);
    }
    .leaderboard .section-head {
      border-bottom-color: #4b493d;
    }
    .leaderboard .small { color: #bdb6a5; }
    .leader-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #4b493d;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .leader-row.reference {
      color: #bdb6a5;
      font-style: italic;
    }
    .leader-score {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16, 16, 13, 0.54);
      padding: 18px;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal.open {
      display: flex;
      animation: fade 120ms ease-out;
    }
    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-dialog {
      width: min(760px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      background: var(--panel);
      border: 2px solid var(--black);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .modal-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }
    .modal h3 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
    }
    .close {
      width: 2.2rem;
      height: 2.2rem;
      padding: 0;
    }
    .modal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
    }
    .agent-line {
      display: grid;
      grid-template-columns: 160px 74px 1fr;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      align-items: start;
    }
    .agent-name {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
    }
    .reasoning {
      color: var(--muted);
      line-height: 1.35;
    }
    .risk-list {
      margin: 8px 0 16px;
      padding-left: 20px;
      color: var(--muted);
    }
    .unlock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    @media (max-width: 860px) {
      header, main {
        grid-template-columns: 1fr;
      }
      .leaderboard {
        position: static;
      }
      .metrics, .stance-form, .modal-grid {
        grid-template-columns: 1fr;
      }
      .agent-line {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  </div>
  <script>
    const fallbackData = {
      agents: [{"id":"momentum_quant","name":"MomentumQuant","persona":"Quantitative momentum trader. Weights technical indicators, recent price action, ETF flow data. Follows established trends; underweights mean reversion."},{"id":"contrarian","name":"Contrarian","persona":"Fades crowded positioning. Looks for sentiment extremes and bets against them. Skeptical of consensus narratives; suspicious of clean stories."},{"id":"macro_hawk","name":"MacroHawk","persona":"Top-down macro analyst. Weights Fed policy, inflation prints, dollar strength, global liquidity, geopolitics. Looks for causal chains tied to rates and risk regime."},{"id":"tech_fundamentals","name":"TechFundamentals","persona":"Bottom-up fundamentals. Reads adoption metrics, on-chain data, earnings guidance, R&D filings. Anchors to base rates and engineering reality."},{"id":"political_analyst","name":"PoliticalAnalyst","persona":"Policy and regulation specialist. Weights political risk, election cycles, regulatory drift, institutional path-dependence."}],
      markets: [{"id":"mkt_001","title":"Will Bitcoin close above $100,000 on March 1, 2026?","slug":"btc-100k-mar-2026","polymarket_yes":0.42,"resolution":"open","stances":{"momentum_quant":{"probability":0.55,"reasoning":"30-day moving average crossed bullish; spot ETF inflows accelerating week-over-week."},"contrarian":{"probability":0.38,"reasoning":"Crowded retail long; positioning data shows late-cycle marginal buyers."},"macro_hawk":{"probability":0.48,"reasoning":"Fed stance and DXY trajectory dominate crypto in Q1; macro neutral-bearish."},"tech_fundamentals":{"probability":0.52,"reasoning":"Spot ETF aggregate AUM > $80B; post-halving supply schedule tight."},"political_analyst":{"probability":0.45,"reasoning":"Pro-asset regulatory tone; SAB-122 reversal supportive of institutional flows."}},"risk_factors":["BTC ETF outflows accelerate on a macro liquidity shock","Major exchange security incident or surprise enforcement action","Halving-cycle thesis fails to convert to price in the available window"]},{"id":"mkt_002","title":"Will the Fed cut rates at the next FOMC meeting?","slug":"fed-cut-next-fomc","polymarket_yes":0.31,"resolution":"open","stances":{"momentum_quant":{"probability":0.28,"reasoning":"FOMC dot plot trending hawkish; rates futures pricing < 25bps cut."},"contrarian":{"probability":0.4,"reasoning":"Market underpricing dovish surprise; Treasury rhetoric softening."},"macro_hawk":{"probability":0.35,"reasoning":"Core PCE sticky at 2.8%; FOMC consensus unlikely to move without slack data."},"tech_fundamentals":{"probability":0.25,"reasoning":"Bond market implied probability tracks ~20-22% \u2014 anchor to that signal."},"political_analyst":{"probability":0.3,"reasoning":"Political pressure on Fed to cut but Powell remains data-dependent."}},"risk_factors":["Core inflation reading surprises hot before the meeting","Labor market remains tight in next NFP print","Geopolitical event triggers risk-off and forces dovish pivot"]},{"id":"mkt_003","title":"Will SpaceX Starship V2 complete an orbital flight in Q1 2026?","slug":"starship-v2-q1-2026","polymarket_yes":0.68,"resolution":"yes","stances":{"momentum_quant":{"probability":0.72,"reasoning":"SpaceX hit cadence targets last three launches; preflight checks completed."},"contrarian":{"probability":0.55,"reasoning":"Cadence has slipped twice this year; market overconfident in linear extrapolation."},"macro_hawk":{"probability":0.65,"reasoning":"Macro irrelevant; pure engineering execution question."},"tech_fundamentals":{"probability":0.75,"reasoning":"13/13 recent static fire tests successful; orbital readiness >90% per filings."},"political_analyst":{"probability":0.65,"reasoning":"FAA license cycle improving but still gated; political risk minimal."}},"risk_factors":["Static-fire failure during final integration","FAA license amendment delay","Weather/range scrub pushes attempt past Q1 cutoff"]},{"id":"mkt_004","title":"Will OpenAI release GPT-5 before July 1, 2026?","slug":"gpt5-h1-2026","polymarket_yes":0.55,"resolution":"open","stances":{"momentum_quant":{"probability":0.62,"reasoning":"OpenAI announcement cadence accelerating; competitive pressure peaking."},"contrarian":{"probability":0.4,"reasoning":"OpenAI release timing slipped 3 of last 5; July deadline aggressive."},"macro_hawk":{"probability":0.5,"reasoning":"Macro neutral; AI capex pressure cuts both ways on release timing."},"tech_fundamentals":{"probability":0.68,"reasoning":"Compute scale-up confirmed via H100 orders; release window aligns with cadence."},"political_analyst":{"probability":0.55,"reasoning":"EU AI Act compliance may delay global launch; US-only ship more likely."}},"risk_factors":["Compute supply constraints push training timeline","Competitive launch from Anthropic or Google shifts release strategy","Safety/eval pipeline introduces release delay"]},{"id":"mkt_005","title":"Will the S&P 500 close above 6,000 by end of Q2 2026?","slug":"sp500-6000-q2-2026","polymarket_yes":0.73,"resolution":"open","stances":{"momentum_quant":{"probability":0.78,"reasoning":"MACD bullish crossover on weekly; realized volatility compressed."},"contrarian":{"probability":0.6,"reasoning":"Valuations stretched; concentration risk in seven names."},"macro_hawk":{"probability":0.7,"reasoning":"Liquidity supportive; risk-on regime intact through Q2."},"tech_fundamentals":{"probability":0.72,"reasoning":"EPS revisions positive; magnificent-7 beat consensus 88% last cycle."},"political_analyst":{"probability":0.7,"reasoning":"Election-year volatility but median path remains supportive."}},"risk_factors":["Recession signal triggers 10%+ correction","AI capex bubble repricing event","Geopolitical shock \u2014 Taiwan / Iran / Russia escalation"]},{"id":"mkt_006","title":"Will Ethereum ETF inflows exceed Bitcoin ETF inflows for May 2026?","slug":"eth-vs-btc-etf-may-2026","polymarket_yes":0.22,"resolution":"no","stances":{"momentum_quant":{"probability":0.15,"reasoning":"BTC ETF momentum dominated through Q2; ETH inflows stagnant."},"contrarian":{"probability":0.32,"reasoning":"ETH staking-rewards narrative undervalued; flow asymmetry stretched."},"macro_hawk":{"probability":0.18,"reasoning":"Risk-off pulls capital to BTC ETF; ETH treated as risk asset."},"tech_fundamentals":{"probability":0.2,"reasoning":"ETH ETF approved later, smaller institutional inflow channel."},"political_analyst":{"probability":0.25,"reasoning":"SEC ETH-staking guidance still pending; regulatory drag on inflows."}},"risk_factors":["Surprise SEC approval of ETH staking-yield ETF product","BTC ETF outflows for unrelated macro reasons","Major institutional allocator reweights from BTC to ETH"]},{"id":"mkt_007","title":"Will a major US presidential candidate publicly use an AI agent during a debate before 2027?","slug":"ai-agent-us-debate-2027","polymarket_yes":0.18,"resolution":"open","stances":{"momentum_quant":{"probability":0.22,"reasoning":"Adoption curve trending up but political cycle timing matters more than trend."},"contrarian":{"probability":0.3,"reasoning":"Underpriced tail; AI use in political messaging already trending mainstream."},"macro_hawk":{"probability":0.15,"reasoning":"Regulatory headwinds slow institutional adoption pre-election."},"tech_fundamentals":{"probability":0.18,"reasoning":"Adoption beta unlocked but politicians lag tech by 18-24 months."},"political_analyst":{"probability":0.35,"reasoning":"Some candidates already using AI for messaging; debate format use plausible."}},"risk_factors":["Campaign legal advisors discourage public AI use for liability reasons","AI scandal pre-debate creates political cost for early adopters","Debate-host format excludes electronic aids"]},{"id":"mkt_008","title":"Will Nvidia stock close above $1,200 on the next earnings day?","slug":"nvda-1200-next-er","polymarket_yes":0.47,"resolution":"open","stances":{"momentum_quant":{"probability":0.52,"reasoning":"Earnings momentum into print; sentiment skew positive on options chain."},"contrarian":{"probability":0.42,"reasoning":"Crowded long; consensus too clean for surprise asymmetry."},"macro_hawk":{"probability":0.55,"reasoning":"AI capex cycle and dollar weakness combine bullish for AI-exposed names."},"tech_fundamentals":{"probability":0.58,"reasoning":"Data-center revenue guidance implies 40% YoY beat probability."},"political_analyst":{"probability":0.48,"reasoning":"Export-controls headwind to China unresolved; near-term overhang."}},"risk_factors":["China demand softens further on new export controls","AI capex investors pause for digestion phase","Pre-earnings de-risking by macro funds"]},{"id":"mkt_009","title":"Will Apple announce a Vision Pro 2 before WWDC 2026?","slug":"vision-pro-2-pre-wwdc-2026","polymarket_yes":0.12,"resolution":"no","stances":{"momentum_quant":{"probability":0.08,"reasoning":"Apple announcement cycle points to WWDC reveal, not pre-conference drop."},"contrarian":{"probability":0.18,"reasoning":"Pre-WWDC announcements have surprised in past cycles."},"macro_hawk":{"probability":0.1,"reasoning":"Consumer spending soft; Apple unlikely to push pricey launch in Q1-Q2."},"tech_fundamentals":{"probability":0.08,"reasoning":"R&D filings show iteration not a new SKU before fall release window."},"political_analyst":{"probability":0.12,"reasoning":"No regulatory drivers; pure product timing question."}},"risk_factors":["Surprise hardware refresh aligned with retail launch window","Competitive pressure from Meta forces accelerated cadence","Component supply readiness pulls forward announcement"]},{"id":"mkt_010","title":"Will Polymarket exceed $30B in 2026 settled volume?","slug":"polymarket-30b-2026","polymarket_yes":0.55,"resolution":"open","stances":{"momentum_quant":{"probability":0.62,"reasoning":"Run-rate from H2 2025 already implies $30B+ annualized."},"contrarian":{"probability":0.45,"reasoning":"Growth assumptions extrapolated linearly; cycle may have peaked with 2024 election."},"macro_hawk":{"probability":0.65,"reasoning":"Election year drives volume; macro tailwind for risk assets."},"tech_fundamentals":{"probability":0.7,"reasoning":"Trailing 6-month volume already $14B+; clear path to $30B with normal seasonality."},"political_analyst":{"probability":0.58,"reasoning":"Regulatory tailwind under current admin; CFTC light-touch approach."}},"risk_factors":["Enforcement action against US prediction-market participation","Competing platform (Kalshi, others) fragments market share","2026 mid-cycle drop in political-event volume"]}]
    };
    const state = { markets: [], leaderboard: [], agents: [] };
    const dataMode = shouldUseAPI() ? 'api' : 'local';
    let localStore;
    const statusEl = document.getElementById('status');
    const marketsEl = document.getElementById('markets');
    const leaderboardEl = document.getElementById('leaderboard');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');

    function pct(value) {
      return `${Math.round(value * 100)}%`;
    }

    function signedPct(value) {
      const sign = value >= 0 ? '+' : '';
      return `${sign}${Math.round(value * 100)}%`;
    }

    function edgeClass(value) {
      if (Math.abs(value) <= 0.05) return 'edge-neutral';
      return value >= 0 ? 'edge-hot' : 'edge-cold';
    }

    function shouldUseAPI() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('static') === '1') return false;
      if (params.get('api') === '1') return true;
      return window.location.protocol !== 'file:' && window.location.port === '8080';
    }

    async function fetchJSON(path, options) {
      const res = await fetch(path, options);
      if (!res.ok) {
        const body = (await res.text()).trim();
        throw new Error(`${path} ${res.status}${body ? `: ${body}` : ''}`);
      }
      return res.json();
    }

    async function requestJSON(path, options = {}) {
      if (dataMode === 'api') return fetchJSON(path, options);
      return localJSON(path, options);
    }

    async function loadAll() {
      setStatus('loading');
      const [markets, leaderboard, agents] = await Promise.all([
        requestJSON('/api/markets'),
        requestJSON('/api/leaderboard'),
        requestJSON('/api/agents')
      ]);
      state.markets = markets;
      state.leaderboard = leaderboard;
      state.agents = agents;
      render();
      setStatus(dataMode === 'api' ? 'live' : 'local demo');
    }

    function render() {
      renderMarkets();
      renderLeaderboard();
    }

    function renderMarkets() {
      marketsEl.innerHTML = '';
      for (const market of state.markets) {
        const row = document.createElement('article');
        row.className = 'market-row';
        const resolved = market.resolution !== 'open';
        row.innerHTML = `
          <div class="market-top">
            <h3 class="market-title">${escapeHTML(market.title)}</h3>
            ${resolved ? `<span class="badge">resolved ${market.resolution}</span>` : ''}
          </div>
          <div class="metrics">
            <div><span class="metric-label">Polymarket</span><span class="metric-value">${pct(market.polymarket_yes)}</span></div>
            <div><span class="metric-label">Yarrow</span><span class="metric-value yarrow-value">${pct(market.community_prediction)}</span></div>
            <div><span class="metric-label">Edge</span><span class="metric-value edge-value ${edgeClass(market.divergence)}">${signedPct(market.divergence)}</span></div>
            <button type="button" data-view="${market.id}">View &gt;</button>
          </div>
          ${resolved ? '' : forecastFormHTML(market)}
        `;
        marketsEl.appendChild(row);
      }
    }

    function forecastFormHTML(market) {
      return `
        <button type="button" class="stance-toggle" data-toggle="${market.id}">Add your stance</button>
        <form class="stance-form" data-form="${market.id}">
          <input type="text" name="agent" value="stage_demo" aria-label="Agent name">
          <label class="small">Probability <span class="slider-value">65%</span><input type="range" name="probability_yes" min="0" max="1" step="0.01" value="0.65"></label>
          <button type="submit">Submit forecast</button>
        </form>
      `;
    }

    function renderLeaderboard() {
      leaderboardEl.innerHTML = '';
      for (const entry of state.leaderboard) {
        const row = document.createElement('div');
        row.className = 'leader-row';
        row.innerHTML = `<span>${escapeHTML(entry.agent_name)}</span><span class="leader-score">${entry.brier_mean.toFixed(3)}</span>`;
        leaderboardEl.appendChild(row);
      }
      for (const ref of [['Metaculus community', '0.110'], ['Random guessing', '0.250']]) {
        const row = document.createElement('div');
        row.className = 'leader-row reference';
        row.innerHTML = `<span>${ref[0]}</span><span class="leader-score">${ref[1]}</span>`;
        leaderboardEl.appendChild(row);
      }
    }

    marketsEl.addEventListener('click', async (event) => {
      const target = event.target instanceof Element ? event.target : null;
      const viewButton = target ? target.closest('[data-view]') : null;
      const toggleButton = target ? target.closest('[data-toggle]') : null;
      const viewId = viewButton ? viewButton.dataset.view : '';
      const toggleId = toggleButton ? toggleButton.dataset.toggle : '';
      if (viewId) {
        try {
          await openReport(viewId);
        } catch (err) {
          setStatus(`report failed: ${err.message}`, true);
        }
      }
      if (toggleId) {
        const form = marketsEl.querySelector(`[data-form="${toggleId}"]`);
        if (form) form.classList.toggle('open');
      }
    });

    marketsEl.addEventListener('input', (event) => {
      if (event.target.name !== 'probability_yes') return;
      const label = event.target.closest('label').querySelector('.slider-value');
      label.textContent = pct(Number(event.target.value));
    });

    marketsEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.target;
      const id = form.dataset.form;
      const submit = form.querySelector('button[type="submit"]');
      const payload = {
        agent: form.agent.value,
        probability_yes: Number(form.probability_yes.value)
      };
      submit.disabled = true;
      setStatus('submitting');
      try {
        const updated = await requestJSON(`/api/markets/${id}/forecasts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        applyUpdatedMarket(updated);
        try {
          state.leaderboard = await requestJSON('/api/leaderboard');
          renderLeaderboard();
          await loadAll();
        } catch (refreshErr) {
          setStatus(`saved; refresh failed: ${refreshErr.message}`, true);
        }
      } catch (err) {
        setStatus(`submit failed: ${err.message}`, true);
      } finally {
        submit.disabled = false;
      }
    });

    function applyUpdatedMarket(updated) {
      const idx = state.markets.findIndex(market => market.id === updated.id);
      if (idx !== -1) {
        state.markets[idx] = updated;
        renderMarkets();
      }
    }

    async function openReport(id) {
      const report = await requestJSON(`/api/markets/${id}/report`);
      modalTitle.textContent = report.market.title;
      modalBody.innerHTML = `
        <div class="modal-grid">
          <div><span class="metric-label">Polymarket</span><span class="metric-value">${pct(report.market.polymarket_yes)}</span></div>
          <div><span class="metric-label">Yarrow consensus</span><span class="metric-value">${pct(report.market.community_prediction)}</span></div>
          <div><span class="metric-label">Edge</span><span class="metric-value ${edgeClass(report.market.divergence)}">${signedPct(report.market.divergence)}</span></div>
        </div>
        <p class="small">Confidence interval: ${pct(report.confidence_interval[0])} - ${pct(report.confidence_interval[1])}</p>
        <h2>Agent debate</h2>
        ${report.agent_breakdown.map(line => `
          <div class="agent-line">
            <span class="agent-name">${escapeHTML(line.agent_name)}</span>
            <span class="metric-value">${pct(line.probability)}${report.market.resolution === 'open' ? '' : ` / ${line.brier.toFixed(3)}`}</span>
            <span class="reasoning">${escapeHTML(line.reasoning)}</span>
          </div>
        `).join('')}
        <h2 style="margin-top:16px;">Key risk factors</h2>
        <ul class="risk-list">${report.market.risk_factors.map(risk => `<li>${escapeHTML(risk)}</li>`).join('')}</ul>
        <div class="unlock-row"><span>Full report ($5 - Pro Agents only)</span><button type="button" disabled>Unlock</button></div>
      `;
      modal.classList.add('open');
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    async function localJSON(path, options) {
      const method = (options.method || 'GET').toUpperCase();
      const store = ensureLocalStore();
      if (method === 'GET' && path === '/api/agents') return clone(store.agents);
      if (method === 'GET' && path === '/api/markets') return localMarkets();
      if (method === 'GET' && path === '/api/leaderboard') return localLeaderboard();

      const match = path.match(/^\/api\/markets\/([^/]+)(?:\/(report|forecasts))?$/);
      if (!match) throw new Error(`${path} unavailable in local demo mode`);
      const [, id, action] = match;

      if (method === 'GET' && !action) return localMarket(id);
      if (method === 'GET' && action === 'report') return localReport(id);
      if (method === 'POST' && action === 'forecasts') {
        const payload = JSON.parse(options.body || '{}');
        payload.agent = String(payload.agent || '').trim();
        if (!payload.agent) throw new Error('agent is required');
        if (payload.probability_yes < 0 || payload.probability_yes > 1) {
          throw new Error('probability_yes must be between 0 and 1');
        }
        const raw = store.markets.find(market => market.id === id);
        if (!raw) throw new Error(`${path} 404`);
        raw.user_forecasts.push({
          agent: payload.agent,
          probability_yes: Number(payload.probability_yes),
          submitted_at: new Date().toISOString()
        });
        return enrichMarket(raw);
      }
      throw new Error(`${path} unavailable in local demo mode`);
    }

    function ensureLocalStore() {
      if (!localStore) {
        localStore = {
          agents: clone(fallbackData.agents),
          markets: clone(fallbackData.markets).map(market => {
            market.user_forecasts = market.user_forecasts || [];
            return market;
          })
        };
      }
      return localStore;
    }

    function localMarkets() {
      return ensureLocalStore().markets
        .map(enrichMarket)
        .sort((a, b) => Math.abs(b.divergence) - Math.abs(a.divergence));
    }

    function localMarket(id) {
      const raw = ensureLocalStore().markets.find(market => market.id === id);
      if (!raw) throw new Error(`/api/markets/${id} 404`);
      return enrichMarket(raw);
    }

    function localReport(id) {
      const market = localMarket(id);
      const [resolved, resolvedYes] = resolutionOutcome(market.resolution);
      const lines = ensureLocalStore().agents
        .map(agent => {
          const stance = market.stances[agent.id];
          if (!stance) return null;
          return {
            agent_id: agent.id,
            agent_name: agent.name,
            probability: stance.probability,
            reasoning: stance.reasoning,
            brier: resolved ? brierBinary(stance.probability, resolvedYes) : 0
          };
        })
        .filter(Boolean)
        .sort((a, b) => b.probability - a.probability);
      const probabilities = lines.map(line => line.probability);
      return {
        market,
        agent_breakdown: lines,
        confidence_interval: probabilities.length
          ? [Math.min.apply(null, probabilities), Math.max.apply(null, probabilities)]
          : [0, 0]
      };
    }

    function localLeaderboard() {
      const store = ensureLocalStore();
      const byAgent = new Map(store.agents.map(agent => [
        agent.id,
        { name: agent.name, brierScores: [], baselineTotal: 0 }
      ]));
      for (const market of store.markets) {
        const [resolved, resolvedYes] = resolutionOutcome(market.resolution);
        if (!resolved) continue;
        for (const agent of store.agents) {
          const stance = market.stances[agent.id];
          if (!stance) continue;
          const entry = byAgent.get(agent.id);
          entry.brierScores.push(brierBinary(stance.probability, resolvedYes));
          entry.baselineTotal += baselineBinary(stance.probability, resolvedYes);
        }
      }
      return store.agents
        .map(agent => {
          const entry = byAgent.get(agent.id);
          return {
            agent_id: agent.id,
            agent_name: entry.name,
            resolved_count: entry.brierScores.length,
            brier_mean: accumulateBrier(entry.brierScores),
            baseline_total: entry.baselineTotal
          };
        })
        .sort((a, b) => a.brier_mean - b.brier_mean);
    }

    function enrichMarket(raw) {
      const market = clone(raw);
      market.user_forecasts = market.user_forecasts || [];
      const forecasts = [];
      const baseMs = 1700000000 * 1000;
      ensureLocalStore().agents.forEach((agent, idx) => {
        const stance = market.stances[agent.id];
        if (!stance) return;
        forecasts.push({
          start_ms: baseMs + idx * 1000,
          probability_yes: stance.probability
        });
      });
      for (const forecast of market.user_forecasts) {
        forecasts.push({
          start_ms: Date.parse(forecast.submitted_at),
          probability_yes: forecast.probability_yes
        });
      }
      market.community_prediction = weightedMedianBinary(forecasts);
      market.divergence = market.community_prediction - market.polymarket_yes;
      return market;
    }

    function weightedMedianBinary(forecasts) {
      if (forecasts.length === 0) return 0.5;
      if (forecasts.length === 1) return forecasts[0].probability_yes;
      const weights = recencyWeights(forecasts);
      const pairs = forecasts
        .map((forecast, idx) => ({
          probability: forecast.probability_yes,
          weight: weights[idx]
        }))
        .sort((a, b) => a.probability - b.probability);
      const half = weights.reduce((sum, weight) => sum + weight, 0) / 2;
      let cumulative = 0;
      for (const item of pairs) {
        cumulative += item.weight;
        if (cumulative >= half) return item.probability;
      }
      return pairs[pairs.length - 1].probability;
    }

    function recencyWeights(forecasts) {
      const entries = forecasts
        .map((forecast, idx) => ({ idx, startMs: forecast.start_ms }))
        .sort((a, b) => a.startMs - b.startMs || a.idx - b.idx);
      const weights = Array(forecasts.length);
      entries.forEach((entry, rank) => {
        weights[entry.idx] = rank + 1;
      });
      return weights;
    }

    function resolutionOutcome(resolution) {
      if (resolution === 'yes') return [true, true];
      if (resolution === 'no') return [true, false];
      return [false, false];
    }

    function brierBinary(pYes, resolvedYes) {
      const outcome = resolvedYes ? 1 : 0;
      return (pYes - outcome) ** 2;
    }

    function baselineBinary(pYes, resolvedYes) {
      const p = Math.max(resolvedYes ? pYes : 1 - pYes, 1e-200);
      return 100 * Math.log(p * 2) / Math.log(2);
    }

    function accumulateBrier(scores) {
      if (scores.length === 0) return 0;
      return scores.reduce((sum, score) => sum + score, 0) / scores.length;
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    loadAll().catch((err) => {
      setStatus('error', true);
      marketsEl.innerHTML = `<p class="small">${escapeHTML(err.message)}</p>`;
      leaderboardEl.innerHTML = `<p class="small">API unavailable.</p>`;
    });
  </script>
</body>
</html>
